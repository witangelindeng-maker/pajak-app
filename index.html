<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pajak Barang</title>

<style>
  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
body {
  font-family: Arial;
  background: #eef2f7;
  padding: 10px;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  font-size: 16px;
}

button {
  border: none;
  border-radius: 5px;
  background: #4CAF50;
  color: white;
}

button:hover {
  background: #45a049;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th {
  background: #ddd;
}
</style>

<script>

// FORMAT ANGKA (TANPA RP)
function formatAngka(angka){
  angka = Math.round(angka);
  var str = angka + "";
  var hasil = "";
  var hitung = 0;

  for(var i=str.length-1;i>=0;i--){
    hasil = str.charAt(i) + hasil;
    hitung++;
    if(hitung%3==0 && i!=0){
      hasil = "." + hasil;
    }
  }
  return hasil;
}

function hitung(){
  var jenis = document.getElementById("jenis").value;
  var nilai = document.getElementById("nilai").value;

  if(nilai==""){
    alert("Isi nilai dulu!");
    return;
  }

  nilai = parseFloat(nilai);

  var dpp=0, ppn=0, pph=0, bruto=0, netto=0;

  if(jenis=="netto"){
    netto = nilai;
    bruto = (111/98.5)*netto;
    dpp = bruto*100/111;
  }
  else if(jenis=="dpp"){
    dpp = nilai;
    bruto = dpp*1.11;
    netto = bruto - (dpp*0.11) - (dpp*0.015);
  }
  else if(jenis=="bruto"){
    bruto = nilai;
    dpp = bruto*100/111;
    netto = bruto - (dpp*0.11) - (dpp*0.015);
  }

  ppn = dpp*0.11;
  pph = dpp*0.015;

  document.getElementById("hasil").innerHTML =
    "DPP: " + formatAngka(dpp) + "<br>" +
    "PPN11%: " + formatAngka(ppn) + "<br>" +
    "PPh1,5%: " + formatAngka(pph) + "<br><br>" +
    "Bruto: " + formatAngka(bruto) + "<br>" +
    "Netto: " + formatAngka(netto);

  window.data = [jenis, nilai, dpp, ppn, pph, bruto, netto];
}

function tambah(){
  if(!window.data){
    alert("Hitung dulu!");
    return;
  simpanData();}

  var t = document.getElementById("tabel");
  var r = t.insertRow();

  r.insertCell(0).innerHTML = window.data[0];
  r.insertCell(1).innerHTML = formatAngka(window.data[1]);
  r.insertCell(2).innerHTML = formatAngka(window.data[2]);
  r.insertCell(3).innerHTML = formatAngka(window.data[3]);
  r.insertCell(4).innerHTML = formatAngka(window.data[4]);
  r.insertCell(5).innerHTML = formatAngka(window.data[5]);
  r.insertCell(6).innerHTML = formatAngka(window.data[6]);
  r.insertCell(7).innerHTML = "<button onclick='hapus(this)'>X</button>";

  total();
}

function hapus(btn){
  var r = btn.parentNode.parentNode;
  r.parentNode.removeChild(r);
  total();
  simpanData();
}

function ambil(teks){
  return parseFloat(teks.replace(/[^0-9]/g,"")) || 0;
}

function total(){
  var t = document.getElementById("tabel");
  var dpp=0, ppn=0, pph=0;

  for(var i=1;i<t.rows.length;i++){
    dpp += ambil(t.rows[i].cells[2].innerHTML);
    ppn += ambil(t.rows[i].cells[3].innerHTML);
    pph += ambil(t.rows[i].cells[4].innerHTML);
  }

  document.getElementById("total").innerHTML =
    "TOTAL DPP: " + formatAngka(dpp) + "<br>" +
    "TOTAL PPN: " + formatAngka(ppn) + "<br>" +
    "TOTAL PPh: " + formatAngka(pph);
}

</script>
</head>

<body onload="loadData()">

<div class="box">
<h3>Input Data</h3>

<select id="jenis">
<option value="netto">Netto</option>
<option value="dpp">DPP</option>
<option value="bruto">Bruto</option>
</select>

<input type="number" id="nilai" placeholder="Masukkan nilai">

<button onclick="hitung()">Hitung</button>
<button onclick="tambah()">Tambah</button>
</div>

<div class="box">
<h3>Hasil</h3>
<div id="hasil">-</div>
</div>

<div class="box">
<h3>Transaksi</h3>

<table id="tabel">
<tr>
<th>Jenis</th><th>Nilai</th><th>DPP</th><th>PPN</th><th>PPh</th><th>Bruto</th><th>Netto</th><th>X</th>
</tr>
</table>

<h4 id="total"></h4>

</div>

</body>
</html>
// SIMPAN DATA
function simpanData(){
  var t = document.getElementById("tabel");
  var data = [];

  for(var i=1;i<t.rows.length;i++){
    var row = [];
    for(var j=0;j<7;j++){
      row.push(t.rows[i].cells[j].innerHTML);
    }
    data.push(row);
  }

  localStorage.setItem("dataPajak", JSON.stringify(data));
}

// LOAD DATA
function loadData(){
  var data = JSON.parse(localStorage.getItem("dataPajak") || "[]");
  var t = document.getElementById("tabel");

  data.forEach(function(item){
    var r = t.insertRow();

    for(var i=0;i<7;i++){
      r.insertCell(i).innerHTML = item[i];
    }

    r.insertCell(7).innerHTML = "<button onclick='hapus(this)'>X</button>";
  });

  total();
}
